const UI={

  en:{title:"Molavi Kidney Quiz — Tumor Diagnosis",
    meta:"Sections = Molavi Ch.13 subheadings: Gross·Staging / Cystic / Clear cells / Pink cells / Blue·Pediatric / IHC·Molecular. Tap an answer for instant scoring + explanation (why right + why each distractor is wrong).",
    reset:"Reset", reveal:"Reveal all answers", lang:"한국어", exp:"Explanation:",
    score:(d,t,c)=>`answered <b>${d}/${t}</b> · correct <b>${c}</b>`,
    foot:"Educational — Molavi, The Practice of Surgical Pathology (Ch.13 Kidney). Defer grade/stage to AJCC 8th, local protocol & attendings."}
};
const SEC={
 s1:{ko:"Gross & Staging · 그로싱·병기",en:"Gross & Staging"},
 s2:{ko:"Cystic Lesions · 낭성 병변",en:"Cystic Lesions"},
 s3:{ko:"Tumors with Clear Cells · 투명세포 종양 (+ISUP grade)",en:"Tumors with Clear Cells (+ ISUP grade)"},
 s4:{ko:"Tumors with Pink Cells · 분홍세포 종양 (+AML)",en:"Tumors with Pink Cells (+ AML)"},
 s5:{ko:"Blue Cells & Pediatric · 파란세포·소아",en:"Blue Cells & Pediatric"},
 s6:{ko:"IHC & Molecular · 면역염색·분자",en:"IHC & Molecular"}
};

const Q=[
// ── s1 Gross & Staging ──
{s:"s1",a:3,
 ko:{q:"신장 종양 그로싱에서 staging에 결정적인 침범 부위가 *아닌* 것은?",
   o:["Hilum의 renal sinus fat","Capsule을 넘어 perirenal fat","Renal vein (margin·pelvis)","표면의 색이 노란지 갈색인지"],
   e:"색(노랑/갈색)은 종류를 좁히는 육안 단서일 뿐, *병기*를 정하진 않음. staging 결정 = renal sinus fat·perirenal fat·renal vein 침범 + 부신·Gerota."},
 en:{q:"Which is NOT a site decisive for staging at grossing of a renal tumor?",
   o:["Renal sinus fat at the hilum","Beyond the capsule into perirenal fat","Renal vein (margin/pelvis)","Whether the surface is yellow or brown"],
   e:"Surface color narrows the tumor *type*, not the *stage*. Staging sites = renal sinus fat, perirenal fat, renal vein, plus adrenal and Gerota's fascia."}},
{s:"s1",a:1,
 ko:{q:"그로싱 때 renal vein을 *꼭 길게 열어보는* 이유는?",
   o:["색을 보려고","RCC가 vein 안으로 *보이지 않는* tumor thrombus를 뻗어 — margin·정맥침범(pT3a)을 놓치지 않으려고","무게를 재려고","고정을 잘 하려고"],
   e:"RCC는 renal vein으로 tumor thrombus를 보내는데 겉에선 안 보임 → 닫힌 채 자르면 놓침. 열어서 ① vein margin ② 정맥 침범(→pT3a) 확인."},
 en:{q:"Why must you open the renal vein lengthwise at grossing?",
   o:["To see its color","RCC sends *invisible* tumor thrombus into the vein — don't miss the margin or venous invasion (pT3a)","To weigh it","For better fixation"],
   e:"RCC sends tumor thrombus into the renal vein that isn't visible externally → missed if left closed. Open it to check ① vein margin ② venous invasion (→ pT3a)."}},
{s:"s1",a:2,
 ko:{q:"Gerota's fascia를 뚫는 종양 침범은 몇 기이며 흔한가?",
   o:["pT1, 매우 흔함","pT3a, 흔함","pT4, 꽤 드묾","pT2, 보통"],
   e:"Gerota's fascia(perirenal fat을 싸는 얇은 막) 침범 = pT4, 실제로는 꽤 드물다. (renal sinus·perirenal fat·renal vein 침범 = pT3a.)"},
 en:{q:"Tumor through Gerota's fascia = what stage, and is it common?",
   o:["pT1, very common","pT3a, common","pT4, fairly uncommon","pT2, moderate"],
   e:"Invasion through Gerota's fascia (the delicate membrane around perirenal fat) = pT4, and is actually fairly uncommon. (Renal sinus / perirenal fat / renal vein = pT3a.)"}},

// ── s2 Cystic ──
{s:"s2",a:1,
 ko:{q:"Simple cyst·(adult) cystic nephroma·multilocular cystic renal neoplasm of LMP를 가르는 *핵심* 질문은?",
   o:["낭이 몇 개인가","낭벽·격벽에 *clear cell이 있나 없나*","환자 나이","낭의 크기"],
   e:"신장에서 clear cell = RCC 신호. 격벽·낭벽에 clear cell nest가 있으면 양성 cyst가 아니라 multilocular cystic RCC of LMP. simple cyst·cystic nephroma는 clear cell이 *없어야* 성립."},
 en:{q:"The *key* question separating simple cyst vs (adult) cystic nephroma vs multilocular cystic renal neoplasm of LMP?",
   o:["How many cysts","Whether there are *clear cells* in the wall/septa","Patient age","Cyst size"],
   e:"In the kidney, clear cells signal RCC. Clear-cell nests in the septa/wall = multilocular cystic RCC of LMP, not a benign cyst. Simple cyst & cystic nephroma must have *no* clear cells."}},
{s:"s2",a:0,
 ko:{q:"Adult cystic nephroma의 stroma는 무엇을 닮았고 어떤 수용체 양성? (MEST와 같은 결)",
   o:["Ovarian-type stroma (파랗고 cellular·spindly) — ER·PR 양성","Desmoplastic stroma — keratin 양성","지방 stroma — S100 양성","근육 stroma — HMB-45 양성"],
   e:"Adult cystic nephroma = bland 상피 + ovarian-type stroma(파랗고 cellular·spindly, ER/PR 양성). MEST와 한 스펙트럼. clear cell은 없어야 함."},
 en:{q:"Adult cystic nephroma's stroma resembles what, and is positive for which receptors? (spectrum with MEST)",
   o:["Ovarian-type stroma (blue, cellular, spindly) — ER/PR positive","Desmoplastic stroma — keratin positive","Fatty stroma — S100 positive","Muscle stroma — HMB-45 positive"],
   e:"Adult cystic nephroma = bland lining + ovarian-type stroma (blue, cellular, spindly, ER/PR positive). Spectrum with MEST. No clear cells."}},
{s:"s2",a:2,
 ko:{q:"Multilocular cystic renal neoplasm of LMP에서 clear cell이 잘 안 보일 수 있는 함정과 대응은?",
   o:["clear cell이 없으면 무조건 악성","항상 한눈에 보임","격벽 상피가 *벗겨져(denuded)* 있을 때가 많아 — 꼼꼼히 sampling·hunting 해야 놓치지 않음","고배율이 필요 없음"],
   e:"이 종양은 격벽이 denuded되어 clear cell이 안 보일 때가 많아 — 안 보인다고 양성으로 넘기면 놓침. 철저한 sampling이 핵심."},
 en:{q:"Pitfall when clear cells are hard to find in multilocular cystic renal neoplasm of LMP?",
   o:["No clear cells means it's always malignant","Always obvious at a glance","The septal lining is often *denuded* — sample & hunt carefully so you don't miss them","No high power needed"],
   e:"The septa are often denuded of epithelium, so clear cells may be hidden — don't dismiss as benign. Careful sampling is key."}},

// ── s3 Clear cells + ISUP ──
{s:"s3",a:1,
 ko:{q:"신장 종양에서 clear cell을 보면? + '3mm clear cell focus도 carcinoma'의 뜻은?",
   o:["대개 양성 adenoma — 작으면 무시","Renal cell carcinoma를 먼저 — *clear cell adenoma는 없어서* 작은 focus도 carcinoma","항상 부신","항상 oncocytoma"],
   e:"신장 clear cell = RCC 먼저. 실질적으로 'clear cell adenoma'는 없으므로 3mm focus도 (순한) clear cell carcinoma로 본다."},
 en:{q:"Clear cells in a renal tumor → and what does '3 mm clear-cell focus is still carcinoma' mean?",
   o:["Usually benign adenoma — ignore if small","Think renal cell carcinoma first — there is *no clear cell adenoma*, so even a tiny focus is carcinoma","Always adrenal","Always oncocytoma"],
   e:"Clear cells in the kidney → RCC first. There's effectively no 'clear cell adenoma,' so even a 3 mm focus is (an indolent) clear cell carcinoma."}},
{s:"s3",a:2,
 ko:{q:"초보 실수 1번 — clear cell RCC로 오인하기 쉬운 *정상 구조물*과 핵에서의 구별점은?",
   o:["정상 사구체 — 핵이 둥글다","정상 tubule — 핵이 크다","정상 *부신피질* — 지질 vacuole이 *핵을 눌러 stellate(별·톱니) 윤곽*을 만든다(RCC는 핵이 둥긂)","림프절 — 핵이 작다"],
   e:"부신피질은 지질 vacuole이 가득해 clear해 보이지만, vacuole이 핵을 indent해 *stellate* 윤곽. RCC는 핵이 둥글고 섬세한 모세혈관 그물이 있음. 부신이 검체에 있는지 항상 확인."},
 en:{q:"Novice mistake #1 — which *normal* structure mimics clear cell RCC, and the nuclear tell?",
   o:["Normal glomerulus — round nuclei","Normal tubule — large nuclei","Normal *adrenal cortex* — lipid vacuoles *indent the nucleus → stellate outline* (RCC nuclei stay round)","Lymph node — small nuclei"],
   e:"Adrenal cortex looks clear (lipid-laden) but its vacuoles indent the nucleus → stellate outline. RCC nuclei stay round and the tumor has a delicate capillary net. Always check whether the adrenal is present."}},
{s:"s3",a:0,
 ko:{q:"Clear cell RCC의 가장 특징적인 진단 단서는?",
   o:["섬세한 모세혈관이 그물처럼 세포를 packet(acinar)으로 나눔 + 투명세포 + desmoplasia 없음","두꺼운 섬유성 desmoplasia","koilocytic 핵 + perinuclear halo","foamy macrophage로 찬 유두"],
   e:"Clear cell RCC = 'chicken-wire' 모세혈관 그물이 세포를 packet으로 나눔(고등급·전이에서도 유지) + 투명세포 + 섬세한 막 + desmoplasia 없음. ②chromophobe/일반암, ③chromophobe, ④papillary RCC."},
 en:{q:"The most characteristic diagnostic clue of clear cell RCC?",
   o:["A delicate capillary net dividing cells into packets (acinar) + clear cells + no desmoplasia","Thick fibrous desmoplasia","Koilocytic nuclei + perinuclear halo","Papillae packed with foamy macrophages"],
   e:"Clear cell RCC = 'chicken-wire' capillary net dividing cells into packets (kept even in high-grade/mets) + clear cells + delicate membranes + no desmoplasia. ② chromophobe/other ca, ③ chromophobe, ④ papillary RCC."}},
{s:"s3",a:1,
 ko:{q:"Clear cell RCC의 ISUP nucleolar grade에서, Grade I과 III를 가르는 핵심은?",
   o:["세포질 색","10× 대물렌즈에서 *nucleolus가 보이기 시작*하면 Grade III (Grade I·II는 안 보임; I은 림프구 닮은 작은 핵)","종양 크기","mitosis 색"],
   e:"ISUP @10×: I=림프구 닮은 작은 핵·nucleolus 없음 / II=핵 커지나 nucleolus 안 보임 / III=*10×에서 nucleolus 뚜렷* / IV=anaplastic·비정상 mitosis(또는 sarcomatoid). 분기 = '10×에서 nucleolus 보이나'."},
 en:{q:"In ISUP nucleolar grading of clear cell RCC, what separates Grade I from Grade III?",
   o:["Cytoplasm color","Whether *nucleoli become visible at 10×* → Grade III (not seen in I/II; I has small lymphocyte-like nuclei)","Tumor size","Mitosis color"],
   e:"ISUP @10×: I = small lymphocyte-like nuclei, no nucleoli / II = bigger nuclei, nucleoli not visible / III = *nucleoli clearly visible at 10×* / IV = anaplastic / atypical mitoses (or sarcomatoid). Cut = nucleoli visible at 10×."}},
{s:"s3",a:2,
 ko:{q:"Clear cell papillary RCC의 특징적 핵 위치와 임상 성격은?",
   o:["핵이 기저부에 정렬 — 고악성도","핵이 흩어짐 — 중등도","핵이 *lumen 쪽(꼭대기)*에 줄지어('upside-down') — 매우 indolent하여 LMP로 재분류 가능","핵이 없음 — 양성"],
   e:"Clear cell papillary RCC = 투명세포의 작고 진한 핵이 기저부가 아니라 *luminal*에 정렬('upside-down'). 행동이 매우 indolent → LMP로 재분류 가능. 작은 검체에선 clear cell RCC와 혼동 주의."},
 en:{q:"Characteristic nuclear location and behavior of clear cell papillary RCC?",
   o:["Nuclei aligned at the base — high grade","Nuclei scattered — intermediate","Nuclei lined up at the *luminal* surface ('upside-down') — very indolent, may be reclassified as LMP","No nuclei — benign"],
   e:"Clear cell papillary RCC = small dark nuclei aligned at the *luminal* (apical) surface, not the base ('upside-down'). Very indolent → may be reclassified as LMP. On small samples it can mimic clear cell RCC."}},

// ── s4 Pink cells + AML ──
{s:"s4",a:1,
 ko:{q:"Oncocytoma(양성)와 chromophobe RCC를 핵으로 가른다 — 옳은 짝은?",
   o:["Oncocytoma = koilocytic·crinkly 핵 / chromophobe = round·regular","Oncocytoma = round·regular·균일한 핵(저배율에서 '너무 고름') / chromophobe = koilocytic·crinkly 핵 + perinuclear halo","둘 다 동일","oncocytoma = clear cell"],
   e:"Oncocytoma = 둥글고 규칙적이며 *균일한* 핵(저배율에서 인상적). Chromophobe = koilocytic(구겨진) 핵 + perinuclear halo + 악어가죽 막. eosinophilic chromophobe가 oncocytoma를 흉내내도 *crinkly 핵*이면 chromophobe."},
 en:{q:"Oncocytoma (benign) vs chromophobe RCC by nuclei — which pairing is correct?",
   o:["Oncocytoma = koilocytic/crinkly / chromophobe = round/regular","Oncocytoma = round, regular, *uniform* nuclei (strikingly even at low power) / chromophobe = koilocytic/crinkly nuclei + perinuclear halo","Identical","Oncocytoma = clear cells"],
   e:"Oncocytoma = round, regular, uniform nuclei (the evenness strikes you at low power). Chromophobe = crinkly/koilocytic nuclei + perinuclear halo + alligator-skin membranes. An eosinophilic chromophobe mimics oncocytoma, but crinkly nuclei = chromophobe."}},
{s:"s4",a:0,
 ko:{q:"Oncocytoma 진단과 *양립 불가능한*(있으면 oncocytoma라 부르면 안 되는) 소견이 아닌 것은?",
   o:["규칙적이고 둥근 균일한 핵","Mitosis(분열상)","Papillary architecture","Clear cells / 육안 vascular invasion"],
   e:"Oncocytoma는 양성이라 *악성 흔적 0일 때만* 붙인다. mitosis·papillary·clear cells·gross vascular invasion은 각각 다른(악성) 진단을 가리켜 oncocytoma를 배제. ①규칙적 핵은 *전형적* 소견이라 양립 가능."},
 en:{q:"Which feature is NOT incompatible with a diagnosis of oncocytoma?",
   o:["Regular, round, uniform nuclei","Mitoses","Papillary architecture","Clear cells / gross vascular invasion"],
   e:"Oncocytoma is benign — diagnosed only with *no* malignant features. Mitoses, papillary architecture, clear cells, and gross vascular invasion each point to another (malignant) Dx → exclude oncocytoma. ① regular nuclei are *typical*, so compatible."}},
{s:"s4",a:2,
 ko:{q:"Perinuclear halo(핵 주위 투명 고리)는 어느 종양에? 무슨 뜻?",
   o:["Oncocytoma — 세포질이 핵까지 빽빽","둘 다 없음","Chromophobe — 핵을 둘러싼 *투명한 세포질 고리*(koilocytic). Oncocytoma는 halo 없음","Papillary RCC — foamy 고리"],
   e:"Perinuclear halo = 핵을 빙 두른 투명한 빈 고리. Chromophobe에 있고(koilocytic 양상) oncocytoma엔 없음(분홍 세포질이 핵까지 빽빽). halo+crinkly핵=chromophobe / halo없음+round핵=oncocytoma."},
 en:{q:"Which tumor shows a perinuclear halo, and what is it?",
   o:["Oncocytoma — cytoplasm dense to the nucleus","Neither","Chromophobe — a *clear ring of cytoplasm* around the nucleus (koilocytic). Oncocytoma has no halo","Papillary RCC — a foamy ring"],
   e:"Perinuclear halo = a clear empty ring of cytoplasm around the nucleus. Present in chromophobe (koilocytic look), absent in oncocytoma (cytoplasm dense to the nucleus). Halo + crinkly nuclei = chromophobe; no halo + round nuclei = oncocytoma."}},
{s:"s4",a:0,
 ko:{q:"Papillary RCC의 거의 pathognomonic한 그림과 Type 1 vs 2의 색은?",
   o:["Fibrovascular core가 *foamy macrophage*로 가득 + cuboidal 세포 → Type 1 blue(저등급), Type 2 pink(고등급)","Core가 비어 있음 → 둘 다 분홍","Chicken-wire 모세혈관 → Type 1만","Koilocytic 핵 → Type 2만"],
   e:"Papillary RCC: foamy macrophage로 찬 fibrovascular core를 cuboidal 세포가 덮음(거의 진단적). 저등급 Type 1은 저배율에서 blue, 고등급 Type 2는 pink. psammoma body·hemosiderin도 가능."},
 en:{q:"Papillary RCC's near-pathognomonic image, and the Type 1 vs 2 colors?",
   o:["Fibrovascular cores packed with *foamy macrophages* + cuboidal cells → Type 1 blue (low grade), Type 2 pink (high grade)","Empty cores → both pink","Chicken-wire capillaries → Type 1 only","Koilocytic nuclei → Type 2 only"],
   e:"Papillary RCC: cuboidal cells lining a fibrovascular core packed with foamy macrophages (near-diagnostic). Low-grade Type 1 looks blue at low power; high-grade Type 2 looks pink. Psammoma bodies/hemosiderin may also be seen."}},
{s:"s4",a:1,

let lang=(navigator.language||"ko").toLowerCase().startsWith("ko")?"ko":"en";
const answered={};
const el=id=>document.getElementById(id);

function render(){
  const ui=UI[lang];
  document.documentElement.lang=lang;
  el("title").textContent=ui.title;
  el("meta").textContent=ui.meta;
  el("resetBtn").textContent=ui.reset;
  el("revealBtn").textContent=ui.reveal;
  el("langBtn").textContent=ui.lang;
  el("foot").textContent=ui.foot;
  const quiz=el("quiz");quiz.innerHTML='';
  let lastSec=null;
  Q.forEach((item,qi)=>{
    if(item.s!==lastSec){const h=document.createElement('div');h.className='theme';h.textContent=SEC[item.s][lang]||SEC[item.s].en;quiz.appendChild(h);lastSec=item.s;}
    const L=item[lang];
    const card=document.createElement('div');card.className='q';
    card.innerHTML='<div class="qtxt">'+(qi+1)+'. '+L.q+'</div>';
    L.o.forEach((opt,oi)=>{
      const btn=document.createElement('button');btn.className='opt';btn.textContent=opt;
      btn.onclick=()=>choose(qi,oi,card);
      card.appendChild(btn);
    });
    const exp=document.createElement('div');exp.className='exp';exp.innerHTML='<b>'+ui.exp+'</b> '+L.e;
    card.appendChild(exp);
    if(qi in answered) markCard(card,qi);
    quiz.appendChild(card);
  });
  updateScore();
}
function markCard(card,qi){
  const item=Q[qi];const opts=card.querySelectorAll('.opt');
  opts.forEach((b,i)=>{b.disabled=true;if(i===item.a)b.classList.add('correct');if(i===answered[qi].pick&&answered[qi].pick!==item.a)b.classList.add('wrong');});
  card.querySelector('.exp').classList.add('show');
}
function choose(qi,oi,card){
  if(qi in answered) return;
  answered[qi]={pick:oi,correct:oi===Q[qi].a};
  markCard(card,qi);
  updateScore();
}
function updateScore(){
  const tot=Q.length, done=Object.keys(answered).length, correct=Object.values(answered).filter(x=>x.correct).length;
  el("score").innerHTML=UI[lang].score(done,tot,correct);
}
el("resetBtn").onclick=()=>{for(const k in answered)delete answered[k];render();};
el("revealBtn").onclick=()=>{
  document.querySelectorAll('#quiz .q').forEach((card,qi)=>{
    if(!(qi in answered))answered[qi]={pick:Q[qi].a,correct:true};
    markCard(card,qi);
  });
  updateScore();
};
el("langBtn").onclick=()=>{lang=lang==="ko"?"en":"ko";render();};
render();
</script>
